workflows:
  ios-testflight:
    name: SetAsideTracker — iOS TestFlight

    environment:
      node: 22

      # Reusing the same "AppleConnect" group from your other app on purpose — App Store Connect
      # API key credentials are account/Team-level, not per-app, so the same key works here too.
      # TODO: confirm this is the exact group name in your Codemagic team; rename below if not.
      groups:
        - AppleConnect

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gigtaxtracker.app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true

    scripts:
      - name: Install root workspace dependencies
        # Plain `npm ci` can hit a known npm bug (npm/cli#4828) where a platform-specific
        # optional dependency (here, @rollup/rollup-darwin-arm64 — a transitive dep of
        # vite/vitest) is correctly listed in package-lock.json but doesn't actually get
        # installed on this machine's architecture. Removing any stale node_modules and using
        # `npm install` instead of `npm ci` makes npm re-resolve and fetch the right native
        # binary for whatever machine is actually running the build, rather than trusting a
        # potentially-incomplete prior install.
        script: |
          rm -rf node_modules
          npm install

      - name: Build the tax-engine package
        # apps/mobile depends on @gig-tax-tracker/tax-engine as a workspace package — it's
        # consumed via its compiled dist/ output (not gitignored source), so this must run
        # before anything that imports it.
        script: |
          cd services/tax-engine
          npm run build

      - name: Run tax-engine tests
        script: |
          cd services/tax-engine
          npm test

      - name: Typecheck + test the mobile app
        script: |
          cd apps/mobile
          npm run typecheck
          npm test

      - name: Generate the native iOS project (expo prebuild)
        # Continuous Native Generation: ios/ is gitignored and regenerated fresh on every build
        # from app.json + config plugins, so app.json's name/bundleIdentifier/icon settings are
        # the actual source of truth, not anything checked into ios/. expo prebuild runs `pod
        # install` itself on macOS, but the explicit step below is kept as a harmless safety net.
        script: |
          cd apps/mobile
          npx expo prebuild --platform ios

      - name: Install CocoaPods dependencies
        script: |
          cd apps/mobile/ios
          pod install

      - name: Initialize keychain
        script: keychain initialize

      # No fetch-signing-files step needed here: the actual fix for "no matching profiles" was
      # creating the App Store profile for com.gigtaxtracker.app manually in Apple Developer
      # Portal (it never existed at all, unlike the other app's bundle ID) and re-fetching it
      # into Codemagic's profile list from there. That profile now exists, so the steps below
      # find it directly — a redundant fetch-signing-files call here was failing on a missing
      # APP_STORE_CONNECT_ISSUER_ID env var and isn't needed for anything it was already solved.

      - name: Add signing certificates to keychain
        script: keychain add-certificates

      - name: Apply iOS signing profiles
        script: xcode-project use-profiles

      - name: Increment iOS build number
        # $CM_BUILD_NUMBER is a Codemagic built-in that auto-increments every build — no custom
        # variable to set up. App Store Connect requires a strictly increasing build number per
        # version, so this needs to run on every build, not just once.
        script: |
          cd apps/mobile/ios
          agvtool new-version -all "$CM_BUILD_NUMBER"

      - name: Build iOS IPA
        # Running xcodebuild directly (not through the xcode-project build-ipa wrapper) so
        # nothing gets filtered — the wrapper's --verbose only showed its own command-tracing,
        # not xcodebuild's actual stdout/stderr, which is where the real failure reason lives.
        # `tee` prints everything live AND saves it to a file the artifacts section can pick up.
        script: |
          cd apps/mobile
          set -o pipefail
          xcodebuild \
            -workspace "ios/SetAsideTracker.xcworkspace" \
            -scheme "SetAsideTracker" \
            -archivePath "build/ios/xcarchive/SetAsideTracker.xcarchive" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=CVCY985YCD \
            'CODE_SIGN_IDENTITY=Apple Distribution' \
            CODE_SIGN_STYLE=Manual \
            archive 2>&1 | tee xcodebuild-archive.log
          echo "----- error/failed lines -----"
          grep -iE "error:|failed|code ?sign" xcodebuild-archive.log || true

      - name: List build outputs
        script: |
          find apps/mobile -iname "*.ipa" || true

    artifacts:
      - apps/mobile/build/ios/ipa/*.ipa
      - apps/mobile/ios/build/ios/ipa/*.ipa
      - apps/mobile/xcodebuild-archive.log
      - apps/mobile/**/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/Build/*.xcactivitylog

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - jason.snyder1984@gmail.com
        notify:
          success: true
          failure: true

# Android isn't configured yet — no Google Play Console credentials/signing set up at the time
# this file was written. Once those exist, add an "android-internal-track" workflow following
# the same shape: npm ci → build tax-engine → typecheck/test → `expo prebuild --platform android`
# → Gradle build → publish via google_play.
