workflows:
  ios-testflight:
    name: SetAsideTracker — iOS TestFlight

    environment:
      node: 22

      # Reusing the same "AppleConnect" group from your other app on purpose — App Store Connect
      # API key credentials are account/Team-level, not per-app, so the same key works here too.
      # TODO: confirm this is the exact group name in your Codemagic team; rename below if not.
      groups:
        - AppleConnect

      ios_signing:
        distribution_type: app_store
        bundle_identifier: SetAside - com.gigtaxtracker.app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true

    scripts:
      - name: Install root workspace dependencies
        script: npm ci

      - name: Build the tax-engine package
        # apps/mobile depends on @gig-tax-tracker/tax-engine as a workspace package — it's
        # consumed via its compiled dist/ output (not gitignored source), so this must run
        # before anything that imports it.
        script: |
          cd services/tax-engine
          npm run build

      - name: Run tax-engine tests
        script: |
          cd services/tax-engine
          npm test

      - name: Typecheck + test the mobile app
        script: |
          cd apps/mobile
          npm run typecheck
          npm test

      - name: Generate the native iOS project (expo prebuild)
        # Continuous Native Generation: ios/ is gitignored and regenerated fresh on every build
        # from app.json + config plugins, so app.json's name/bundleIdentifier/icon settings are
        # the actual source of truth, not anything checked into ios/. expo prebuild runs `pod
        # install` itself on macOS, but the explicit step below is kept as a harmless safety net.
        script: |
          cd apps/mobile
          npx expo prebuild --platform ios

      - name: Install CocoaPods dependencies
        script: |
          cd apps/mobile/ios
          pod install

      - name: Initialize keychain
        script: keychain initialize

      - name: Add signing certificates to keychain
        script: keychain add-certificates

      - name: Apply iOS signing profiles
        script: xcode-project use-profiles

      - name: Increment iOS build number
        # $CM_BUILD_NUMBER is a Codemagic built-in that auto-increments every build — no custom
        # variable to set up. App Store Connect requires a strictly increasing build number per
        # version, so this needs to run on every build, not just once.
        script: |
          cd apps/mobile/ios
          agvtool new-version -all "$CM_BUILD_NUMBER"

      - name: Build iOS IPA
        script: |
          cd apps/mobile
          xcode-project build-ipa \
            --workspace "ios/SetAsideTracker.xcworkspace" \
            --scheme "SetAsideTracker"

      - name: List build outputs
        script: |
          find apps/mobile -iname "*.ipa" || true

    artifacts:
      - apps/mobile/build/ios/ipa/*.ipa
      - apps/mobile/ios/build/ios/ipa/*.ipa
      - apps/mobile/xcodebuild-archive.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - jason.snyder1984@gmail.com
        notify:
          success: true
          failure: true

# Android isn't configured yet — no Google Play Console credentials/signing set up at the time
# this file was written. Once those exist, add an "android-internal-track" workflow following
# the same shape: npm ci → build tax-engine → typecheck/test → `expo prebuild --platform android`
# → Gradle build → publish via google_play.
